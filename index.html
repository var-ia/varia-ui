<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Varia — Observation UI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>" />
  </head>
  <body>
    <div id="app">
      <header id="app-header">
        <h1>Varia</h1>
        <p class="subtitle">Observation Engine — Timeline Viewer</p>
      </header>
      <div id="toolbar">
        <div id="import-area"></div>
        <div id="filter-area"></div>
        <div id="export-area"></div>
      </div>
      <div id="dashboard">
        <div id="panel-timeline" class="panel"></div>
        <div id="panel-diff" class="panel"></div>
        <div id="panel-citations" class="panel"></div>
        <div id="panel-certainty" class="panel"></div>
      </div>
      <div id="dashboard-row2">
        <div id="panel-disputes" class="panel"></div>
        <div id="panel-wording" class="panel"></div>
        <div id="panel-source" class="panel"></div>
        <div id="panel-schema" class="panel"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
